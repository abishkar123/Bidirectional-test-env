name: Deploy → Staging (development branch)

on:
  push:
    branches: [development]
  pull_request:
    branches: [development]

permissions:
  contents: read
  id-token: write   # cosign keyless signing

env:
  DOTNET_VERSION: "9.0.x"
  PROJECT_PATH: src/Bidirectional.Web/Bidirectional.Web.csproj
  PUBLISH_DIR: publish
  RESOURCE_GROUP: rg-bidirectional-dev-app
  APP_NAME: app-bidirectional-dev-api
  SLOT_NAME: staging
  AUDIT_STORAGE: stbidirectionalaudit

jobs:
  # ── 1. Build & Test ──────────────────────────────────────────────────────────
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: |
          dotnet test --no-build -c Release \
            --collect:"XPlat Code Coverage" \
            --results-directory TestResults \
            --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/
          retention-days: 3

      - name: Derive version
        id: version
        run: echo "version=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            --no-build -c Release \
            -o ${{ env.PUBLISH_DIR }} \
            /p:SourceRevisionId=${{ github.sha }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-publish
          path: ${{ env.PUBLISH_DIR }}
          retention-days: 3

  # ── 2. Deploy to Staging Slot ─────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging Slot
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/development'
    environment: staging
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-publish
          path: ${{ env.PUBLISH_DIR }}

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set ASPNETCORE_ENVIRONMENT = Staging on slot
        run: |
          az webapp config appsettings set \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.APP_NAME }} \
            --slot ${{ env.SLOT_NAME }} \
            --settings ASPNETCORE_ENVIRONMENT=Staging

      - name: Deploy to staging slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          slot-name: ${{ env.SLOT_NAME }}
          package: ${{ env.PUBLISH_DIR }}

  # ── 3. Smoke Test ─────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test (Staging)
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: Wait for slot warmup
        run: sleep 15

      - name: Liveness check
        run: |
          curl --fail --retry 5 --retry-delay 5 \
            "https://${{ env.APP_NAME }}-${{ env.SLOT_NAME }}.azurewebsites.net/health/live"

      - name: Readiness check
        run: |
          curl --fail --retry 5 --retry-delay 5 \
            "https://${{ env.APP_NAME }}-${{ env.SLOT_NAME }}.azurewebsites.net/health/ready"

      - name: Dashboard page check
        run: |
          STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            "https://${{ env.APP_NAME }}-${{ env.SLOT_NAME }}.azurewebsites.net/")
          echo "Dashboard HTTP status: $STATUS"
          [ "$STATUS" = "200" ]

  # ── 4. Release Evidence + SBOM + Cosign (Staging) ────────────────────────────
  release-evidence:
    name: Upload Release Evidence + Sign SBOM
    runs-on: ubuntu-latest
    needs: [build, smoke-test]
    if: always() && needs.smoke-test.result == 'success'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.7.0
        with:
          cosign-release: v2.4.1

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and sign release evidence
        env:
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          VERSION: ${{ needs.build.outputs.version }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          BLOB_PREFIX="${RUN_NUMBER}-attempt${RUN_ATTEMPT}"
          cat > release-evidence.json << EOF
          {
            "runNumber": "${RUN_NUMBER}",
            "version": "${VERSION}",
            "commit": "${COMMIT_SHA}",
            "branch": "${REF_NAME}",
            "actor": "${ACTOR}",
            "deployedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "appName": "${{ env.APP_NAME }}",
            "slot": "${{ env.SLOT_NAME }}",
            "environment": "Staging",
            "slotSwap": false
          }
          EOF

          cosign sign-blob release-evidence.json \
            --bundle release-evidence.json.bundle \
            --yes

          az storage blob upload \
            --account-name ${{ env.AUDIT_STORAGE }} \
            --container-name release-audit \
            --name "${BLOB_PREFIX}/release-evidence.json" \
            --file release-evidence.json \
            --auth-mode login \
            --overwrite true

          az storage blob upload \
            --account-name ${{ env.AUDIT_STORAGE }} \
            --container-name release-audit \
            --name "${BLOB_PREFIX}/release-evidence.json.bundle" \
            --file release-evidence.json.bundle \
            --auth-mode login \
            --overwrite true

      - name: Generate and sign SBOM
        env:
          SBOM_VERSION: ${{ needs.build.outputs.version }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          BLOB_PREFIX="${RUN_NUMBER}-attempt${RUN_ATTEMPT}"
          dotnet tool install --global Microsoft.Sbom.DotNetTool 2>/dev/null || true
          sbom-tool generate \
            -b src/Bidirectional.Web \
            -bc src/Bidirectional.Web \
            -pn Bidirectional.Web \
            -pv "${SBOM_VERSION}" \
            -ps Bidirectional \
            -nsb https://bidirectional.example.com/sbom \
            -m sbom-output

          cp sbom-output/_manifest/spdx_2.2/manifest.spdx.json sbom.spdx.json

          cosign sign-blob sbom.spdx.json \
            --bundle sbom.spdx.json.bundle \
            --yes

          az storage blob upload \
            --account-name ${{ env.AUDIT_STORAGE }} \
            --container-name sbom-archive \
            --name "${BLOB_PREFIX}/sbom.spdx.json" \
            --file sbom.spdx.json \
            --auth-mode login \
            --overwrite true

          az storage blob upload \
            --account-name ${{ env.AUDIT_STORAGE }} \
            --container-name sbom-archive \
            --name "${BLOB_PREFIX}/sbom.spdx.json.bundle" \
            --file sbom.spdx.json.bundle \
            --auth-mode login \
            --overwrite true
