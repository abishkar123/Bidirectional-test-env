name: Deploy → Production (main branch)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Required for cosign keyless signing via GitHub OIDC
permissions:
  contents: read
  id-token: write       # cosign + SLSA provenance OIDC token
  packages: write       # if pushing to GHCR in future

env:
  DOTNET_VERSION: "9.0.x"
  PROJECT_PATH: src/Bidirectional.Web/Bidirectional.Web.csproj
  PUBLISH_DIR: publish
  RESOURCE_GROUP: rg-bidirectional-dev-app
  APP_NAME: app-bidirectional-dev-api
  SLOT_NAME: staging
  AUDIT_STORAGE: stbidirectionalaudit

jobs:
  # ── 1. Build & Test ──────────────────────────────────────────────────────────
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: |
          dotnet test --no-build -c Release \
            --collect:"XPlat Code Coverage" \
            --results-directory TestResults \
            --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/
          retention-days: 7

      - name: Derive version
        id: version
        run: echo "version=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            --no-build -c Release \
            -o ${{ env.PUBLISH_DIR }} \
            /p:SourceRevisionId=${{ github.sha }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-publish
          path: ${{ env.PUBLISH_DIR }}
          retention-days: 7

  # ── 2. Policy Gate ───────────────────────────────────────────────────────────
  policy-gate:
    name: Policy Compliance Gate
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Check policy compliance
        run: |
          STATE=$(az policy state list \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --filter "complianceState eq 'NonCompliant'" \
            --query "length(@)" -o tsv)
          echo "Non-compliant resources: $STATE"
          if [ "$STATE" -gt 0 ]; then
            echo "::warning::$STATE non-compliant policy resource(s) — review before promoting to prod"
          fi

      - name: Upload policy evidence
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          TIMESTAMP=$(date -u +%Y%m%dT%H%M%SZ)
          az policy state list \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "[].{resource:resourceId,policy:policyDefinitionName,state:complianceState}" \
            -o json > "policy-state-${TIMESTAMP}.json"

          az storage blob upload \
            --account-name ${{ env.AUDIT_STORAGE }} \
            --container-name policy-evidence \
            --name "${RUN_NUMBER}/policy-state-${TIMESTAMP}.json" \
            --file "policy-state-${TIMESTAMP}.json" \
            --auth-mode login

  # ── 3. Deploy to Staging Slot ─────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging Slot
    runs-on: ubuntu-latest
    needs: [build, policy-gate]
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-publish
          path: ${{ env.PUBLISH_DIR }}

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set ASPNETCORE_ENVIRONMENT = Staging on slot
        run: |
          az webapp config appsettings set \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.APP_NAME }} \
            --slot ${{ env.SLOT_NAME }} \
            --settings ASPNETCORE_ENVIRONMENT=Staging

      - name: Deploy to staging slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          slot-name: ${{ env.SLOT_NAME }}
          package: ${{ env.PUBLISH_DIR }}

  # ── 4. Smoke Test ─────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test (Staging)
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: Wait for slot warmup
        run: sleep 15

      - name: Liveness check
        run: |
          curl --fail --retry 5 --retry-delay 5 \
            "https://${{ env.APP_NAME }}-${{ env.SLOT_NAME }}.azurewebsites.net/health/live"

      - name: Readiness check
        run: |
          curl --fail --retry 5 --retry-delay 5 \
            "https://${{ env.APP_NAME }}-${{ env.SLOT_NAME }}.azurewebsites.net/health/ready"

      - name: Dashboard page check
        run: |
          STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            "https://${{ env.APP_NAME }}-${{ env.SLOT_NAME }}.azurewebsites.net/")
          echo "Dashboard HTTP status: $STATUS"
          [ "$STATUS" = "200" ]

  # ── 5. Slot Swap → Production ──────────────────────────────────────────────────
  slot-swap:
    name: Slot Swap → Production
    runs-on: ubuntu-latest
    needs: smoke-test
    environment: production           # requires manual approval in GitHub env settings
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Swap staging → production
        run: |
          az webapp deployment slot swap \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.APP_NAME }} \
            --slot ${{ env.SLOT_NAME }} \
            --target-slot production

  # ── 6. Release Evidence + SBOM + Cosign + SLSA ───────────────────────────────
  release-evidence:
    name: Upload Release Evidence + Sign Artifacts
    runs-on: ubuntu-latest
    needs: [build, slot-swap]
    if: always() && needs.slot-swap.result == 'success'
    permissions:
      contents: read
      id-token: write   # cosign keyless signing via GitHub OIDC
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.7.0
        with:
          cosign-release: v2.4.1

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Release evidence JSON ───────────────────────────────────────────────
      - name: Build and sign release evidence
        env:
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          VERSION: ${{ needs.build.outputs.version }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          cat > release-evidence.json << EOF
          {
            "runNumber": "${RUN_NUMBER}",
            "version": "${VERSION}",
            "commit": "${COMMIT_SHA}",
            "branch": "${REF_NAME}",
            "actor": "${ACTOR}",
            "deployedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "appName": "${{ env.APP_NAME }}",
            "slot": "production",
            "environment": "Production",
            "slotSwap": true
          }
          EOF

          # Sign the evidence file (keyless — identity pinned to this workflow)
          cosign sign-blob release-evidence.json \
            --bundle release-evidence.json.bundle \
            --yes

          az storage blob upload \
            --account-name ${{ env.AUDIT_STORAGE }} \
            --container-name release-audit \
            --name "${RUN_NUMBER}/release-evidence.json" \
            --file release-evidence.json \
            --auth-mode login

          # Upload the cosign bundle alongside the evidence
          az storage blob upload \
            --account-name ${{ env.AUDIT_STORAGE }} \
            --container-name release-audit \
            --name "${RUN_NUMBER}/release-evidence.json.bundle" \
            --file release-evidence.json.bundle \
            --auth-mode login

      # ── SBOM generation (SPDX 2.2 via Microsoft SBOM Tool) ─────────────────
      - name: Generate SBOM
        env:
          SBOM_VERSION: ${{ needs.build.outputs.version }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          dotnet tool install --global Microsoft.Sbom.DotNetTool 2>/dev/null || true
          sbom-tool generate \
            -b src/Bidirectional.Web \
            -bc src/Bidirectional.Web \
            -pn Bidirectional.Web \
            -pv "${SBOM_VERSION}" \
            -ps Bidirectional \
            -nsb https://bidirectional.example.com/sbom \
            -o sbom-output

          cp sbom-output/_manifest/spdx_2.2/manifest.spdx.json sbom.spdx.json

          az storage blob upload \
            --account-name ${{ env.AUDIT_STORAGE }} \
            --container-name sbom-archive \
            --name "${RUN_NUMBER}/sbom.spdx.json" \
            --file sbom.spdx.json \
            --auth-mode login

      # ── Cosign sign the SBOM ────────────────────────────────────────────────
      - name: Sign SBOM with cosign
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          # Keyless signing — certificate identity is this workflow's OIDC token.
          # The bundle contains the signature, certificate chain, and Rekor
          # transparency log entry — all verifiable without any stored key.
          cosign sign-blob sbom.spdx.json \
            --bundle sbom.spdx.json.bundle \
            --yes

          az storage blob upload \
            --account-name ${{ env.AUDIT_STORAGE }} \
            --container-name sbom-archive \
            --name "${RUN_NUMBER}/sbom.spdx.json.bundle" \
            --file sbom.spdx.json.bundle \
            --auth-mode login

      # ── SLSA provenance ─────────────────────────────────────────────────────
      - name: Generate SLSA provenance
        env:
          RUN_NUMBER: ${{ github.run_number }}
          COMMIT_SHA: ${{ github.sha }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          # Build a SLSA v1.0 provenance document for the published artifact.
          # This records: builder identity, source commit, build steps, and the
          # SHA-256 digest of the SBOM — making the build chain auditable.
          SBOM_DIGEST=$(sha256sum sbom.spdx.json | awk '{print $1}')

          cat > provenance.json << EOF
          {
            "_type": "https://in-toto.io/Statement/v1",
            "subject": [
              {
                "name": "sbom.spdx.json",
                "digest": { "sha256": "${SBOM_DIGEST}" }
              }
            ],
            "predicateType": "https://slsa.dev/provenance/v1",
            "predicate": {
              "buildDefinition": {
                "buildType": "https://slsa-framework.github.io/github-actions-buildtypes/workflow/v1",
                "externalParameters": {
                  "workflow": {
                    "ref": "refs/heads/main",
                    "repository": "${{ github.repository }}",
                    "path": ".github/workflows/deploy-prod.yml"
                  }
                },
                "resolvedDependencies": [
                  {
                    "uri": "git+https://github.com/${{ github.repository }}@refs/heads/main",
                    "digest": { "gitCommit": "${COMMIT_SHA}" }
                  }
                ]
              },
              "runDetails": {
                "builder": {
                  "id": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                },
                "metadata": {
                  "invocationId": "${{ github.run_id }}",
                  "startedOn": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
                  "completedOn": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                }
              }
            }
          }
          EOF

          # Sign the provenance with cosign
          cosign sign-blob provenance.json \
            --bundle provenance.json.bundle \
            --yes

          az storage blob upload \
            --account-name ${{ env.AUDIT_STORAGE }} \
            --container-name provenance-archive \
            --name "${RUN_NUMBER}/provenance.json" \
            --file provenance.json \
            --auth-mode login

          az storage blob upload \
            --account-name ${{ env.AUDIT_STORAGE }} \
            --container-name provenance-archive \
            --name "${RUN_NUMBER}/provenance.json.bundle" \
            --file provenance.json.bundle \
            --auth-mode login

      # ── Upload all scan results ─────────────────────────────────────────────
      - name: Upload scan results summary
        env:
          RUN_NUMBER: ${{ github.run_number }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          cat > scan-summary.json << EOF
          {
            "runNumber": "${RUN_NUMBER}",
            "commit": "${COMMIT_SHA}",
            "sbomGenerated": true,
            "sbomSigned": true,
            "provenanceSigned": true,
            "evidenceSigned": true,
            "signingMethod": "cosign-keyless-oidc",
            "rekorTransparencyLog": true,
            "generatedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

          az storage blob upload \
            --account-name ${{ env.AUDIT_STORAGE }} \
            --container-name scan-results \
            --name "${RUN_NUMBER}/scan-summary.json" \
            --file scan-summary.json \
            --auth-mode login
